<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Portal - College Digital Notice Board</title>
  <meta name="description" content="Interactive digital notice board for college students and administrators. View, search, categorize, and interact with academic notices.">
  
  <!-- Google Fonts: Plus Jakarta Sans for a clean, modern aesthetic -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- 1. Live Urgent Notices Ticker -->
  <div class="ticker-wrap" id="urgent-ticker">
    <div class="ticker-label">
      <i data-lucide="megaphone" class="ticker-icon"></i>
      <span>LATEST NOTICES</span>
    </div>
    <div class="ticker-content" id="ticker-text-container">
      <div class="ticker-items" id="ticker-items">
        <!-- Dynamic scrolling ticker items will go here -->
      </div>
    </div>
  </div>

  <!-- 2. Header Navigation -->
  <header class="main-header">
    <div class="header-container">
      
      <!-- Brand Logo -->
      <div class="logo-area">
        <div class="logo-icon-bg">
          <i data-lucide="graduation-cap" class="logo-icon"></i>
        </div>
        <div class="logo-text">
          <h1>Aether Portal</h1>
          <span class="logo-subtitle">Notice Board & Stream</span>
        </div>
      </div>
      
      <!-- Search Bar -->
      <div class="search-area">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" placeholder="Search notices, events, attachments...">
        <button class="clear-search-btn" id="clear-search" style="display: none;">
          <i data-lucide="x"></i>
        </button>
      </div>

      <!-- Action Area: Role Selector & User Profile -->
      <div class="action-area">
        <!-- Role Switcher Widget -->
        <div class="role-selector-card">
          <span class="role-label">Viewing as:</span>
          <div class="role-toggle-group" id="role-toggle-group">
            <button class="role-btn active" id="btn-student" data-role="student">
              <i data-lucide="user"></i> Student
            </button>
            <button class="role-btn" id="btn-admin" data-role="admin">
              <i data-lucide="shield-check"></i> Admin
            </button>
          </div>
        </div>

        <!-- Notification Bell -->
        <div class="header-notification-bell" id="notification-bell">
          <i data-lucide="bell" class="bell-icon"></i>
          <span class="bell-badge" id="bell-badge-count" style="display: none;">0</span>
          
          <!-- Dropdown showing recent posts -->
          <div class="notification-dropdown" id="notification-dropdown">
            <div class="dropdown-header">
              <h3>Recent Updates</h3>
              <button id="mark-all-read">Clear</button>
            </div>
            <div class="dropdown-list" id="notification-list">
              <div class="dropdown-empty">No new updates</div>
            </div>
          </div>
        </div>

        <!-- Profile Avatar -->
        <div class="user-avatar-circle" id="user-avatar-profile">
          <span id="user-avatar-initials">ST</span>
        </div>
      </div>

    </div>
  </header>

  <!-- Main Workspace -->
  <main class="app-workspace">
    <div class="workspace-container">
      
      <!-- Google Classroom Inspired Banner -->
      <section class="classroom-hero" id="hero-banner">
        <div class="hero-content">
          <h2 class="hero-title" id="hero-title-text">Welcome back, Student!</h2>
          <p class="hero-subtitle">Stay updated with your courses, exams, and campus events.</p>
          <div class="hero-stats">
            <div class="stat-tag">
              <i data-lucide="hash"></i>
              <span id="stat-total-count">0 Notices</span>
            </div>
            <div class="stat-tag urgent">
              <i data-lucide="alert-circle"></i>
              <span id="stat-urgent-count">0 Urgent</span>
            </div>
            <div class="stat-tag starred">
              <i data-lucide="star"></i>
              <span id="stat-starred-count">0 Starred</span>
            </div>
          </div>
        </div>
        <div class="hero-visual-pattern"></div>
      </section>

      <!-- Content Layout: 2 Columns (Sidebar & Stream Feed) -->
      <div class="content-grid">
        
        <!-- Left Column: Sidebar Filters & Info -->
        <aside class="sidebar-column">
          
          <!-- Navigation Filters -->
          <nav class="sidebar-nav-card">
            <h3>Categories</h3>
            <ul class="category-list">
              <li>
                <button class="cat-filter-btn active" data-category="all">
                  <i data-lucide="layout-grid"></i>
                  <span>All Stream</span>
                  <span class="cat-badge" id="count-all">0</span>
                </button>
              </li>
              <li>
                <button class="cat-filter-btn" data-category="exam">
                  <i data-lucide="file-text"></i>
                  <span>Exams & Results</span>
                  <span class="cat-badge" id="count-exam">0</span>
                </button>
              </li>
              <li>
                <button class="cat-filter-btn" data-category="event">
                  <i data-lucide="calendar"></i>
                  <span>Events & Activities</span>
                  <span class="cat-badge" id="count-event">0</span>
                </button>
              </li>
              <li>
                <button class="cat-filter-btn" data-category="placement">
                  <i data-lucide="briefcase"></i>
                  <span>Placements & Careers</span>
                  <span class="cat-badge" id="count-placement">0</span>
                </button>
              </li>
              <li>
                <button class="cat-filter-btn" data-category="general">
                  <i data-lucide="info"></i>
                  <span>General Info</span>
                  <span class="cat-badge" id="count-general">0</span>
